name: lint / deps

on:
  pull_request:
    paths:
      - .github/workflows/lint--deps.yaml
      - 'crates/**/*.rs'
      - '**/Cargo.lock'
      - '**/Cargo.toml'

jobs:
  machete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-machete
          # renovate: datasource=crate depName=cargo-machete
          version: "0.9.1"
      - run: cargo machete --with-metadata --fix
        continue-on-error: true
      - id: generate-token
        uses: oakcask/gh-token-gen@e3d2caa8ef6111f5a516995d88890d3fb09206e3 # v5.0.0
        with:
          app-id: ${{ secrets.TOKEN_GEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_GEN_PRIVATE_KEY }}
      - uses: int128/update-generated-files-action@78a2ec19f89c99123f47cfc500aece081cf10d7f # v2
        with:
          commit-message: "chore: cleanup lockfiles"
          token: ${{ steps.generate-token.outputs.token }}
