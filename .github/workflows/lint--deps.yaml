name: lint / deps

on:
  pull_request:
    paths:
      - .github/workflows/lint--deps.yaml
      - 'crates/**/*.rs'
      - '**/Cargo.lock'
      - '**/Cargo.toml'

jobs:
  machete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-machete
          # renovate: datasource=crate depName=cargo-machete
          version: "0.9.1"
      - run: cargo machete --with-metadata --fix
        continue-on-error: true
      - id: generate-token
        uses: oakcask/gh-token-gen@4bd7b29d36a07b1de07b49c9fdbfe16c03d00bc2 # v5.1.0
        with:
          app-id: ${{ secrets.TOKEN_GEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_GEN_PRIVATE_KEY }}
      - uses: int128/update-generated-files-action@dc76a132136f514f84861a509955aa498d249e56 # v2
        with:
          commit-message: "chore: cleanup lockfiles"
          token: ${{ steps.generate-token.outputs.token }}
